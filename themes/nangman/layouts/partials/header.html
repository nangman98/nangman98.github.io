<div class="mt-3 mb-5 d-flex justify-content-end align-items-center gap-2" style="min-height: 30px;">
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <i class="bi bi-moon-fill"></i>
    </button>
</div>
<div class="d-flex flex-column flex-lg-row justify-content-lg-between align-items-center">
  <div class="me-lg-5 mb-3 mb-lg-0 d-flex justify-content-between align-items-center w-100 w-lg-auto">
    <a href="/" class="d-flex align-items-center text-decoration-none">
      <span class="fs-4 fw-light text-dark">{{ site.Title }}</span>
    </a>
    <button class="btn btn-link d-lg-none p-0 border-0 text-dark" type="button" data-bs-toggle="collapse"
      data-bs-target="#mainNav" aria-expanded="false" aria-controls="mainNav">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-list" viewBox="0 0 16 16">
        <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/>
      </svg>
    </button>
  </div>
  <nav class="collapse d-lg-flex w-100 w-lg-auto" id="mainNav">
    <div class="d-flex flex-column flex-lg-row w-100 w-lg-auto">
      {{ $currentPage := . }}
      {{ range site.Menus.main }}
      {{ if or ($currentPage.IsMenuCurrent .Menu .) ($currentPage.HasMenuCurrent .Menu .)}}
      <a href="{{ .URL }}" class="fs-6 fw-light link-dark link-offset-2 link-underline-opacity-100 align-middle px-2 py-2 py-lg-0">{{ .Name }}</a>
      {{ else }}
      <a href="{{ .URL }}" class="fs-6 fw-light link-dark link-offset-2 link-underline-opacity-0 link-underline-opacity-25-hover align-middle px-2 py-2 py-lg-0">{{ .Name }}</a>
      {{ end }}
      {{- end }}
    </div>
  </nav>
</div>
